name: chat_app
description: "ChatApp - 聊天应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP
  dio: ^5.0.0
  # WebSocket
  web_socket_channel: ^3.0.0
  # 状态管理
  provider: ^6.0.0
  # 本地存储（token）
  shared_preferences: ^2.2.0
  # 图片选择
  image_picker: ^1.0.0
  # 日期格式化
  intl: ^0.19.0
  # 网络图片缓存
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
